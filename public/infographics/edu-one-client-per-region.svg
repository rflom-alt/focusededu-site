<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>One client per region</title>
  <desc>Explains FocusedEDU's exclusive model: one partner school per region, a talent pipeline never shared with competitors.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a1f"/>
      <stop offset="1" stop-color="#0a1130"/>
    </linearGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#14a673" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#14a673" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="1250" fill="url(#bg3)"/>
  <rect width="1000" height="1250" fill="url(#glow3)"/>

  <rect x="80" y="96" width="48" height="4" rx="2" fill="#24cb8c"/>
  <text x="140" y="104" fill="#3ddca0" font-size="22" font-weight="700" letter-spacing="3">OUR STRONGEST PROMISE</text>
  <text x="80" y="190" fill="#ffffff" font-size="64" font-weight="800">One client</text>
  <text x="80" y="262" fill="#ffffff" font-size="64" font-weight="800">per <tspan fill="#3ddca0">region.</tspan></text>

  <!-- emblem: a single pin among faded others -->
  <g>
    <circle cx="500" cy="560" r="160" fill="none" stroke="#24cb8c" stroke-opacity="0.25" stroke-width="2"/>
    <circle cx="500" cy="560" r="110" fill="none" stroke="#24cb8c" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="500" cy="560" r="58" fill="#24cb8c"/>
    <path d="M500 528 a26 26 0 1 1 -0.1 0 Z" fill="#060a1f"/>
    <circle cx="500" cy="552" r="9" fill="#24cb8c"/>
    <path d="M500 600 l0 26" stroke="#060a1f" stroke-width="6" stroke-linecap="round"/>
    <!-- faded competitor pins kept out -->
    <circle cx="250" cy="470" r="20" fill="#1a2350"/>
    <circle cx="770" cy="500" r="20" fill="#1a2350"/>
    <circle cx="300" cy="690" r="20" fill="#1a2350"/>
    <circle cx="740" cy="690" r="20" fill="#1a2350"/>
  </g>

  <text x="500" y="800" fill="#ffffff" font-size="30" font-weight="600" text-anchor="middle">We partner with a single school or district</text>
  <text x="500" y="842" fill="#ffffff" font-size="30" font-weight="600" text-anchor="middle">per region — and no one else.</text>

  <!-- three guarantees -->
  <g text-anchor="middle">
    <text x="250" y="960" fill="#3ddca0" font-size="22" font-weight="700" letter-spacing="1">EXCLUSIVE</text>
    <text x="250" y="998" fill="#8e9adb" font-size="20">Your pipeline only</text>
    <text x="500" y="960" fill="#3ddca0" font-size="22" font-weight="700" letter-spacing="1">NEVER SHARED</text>
    <text x="500" y="998" fill="#8e9adb" font-size="20">Not with rivals</text>
    <text x="750" y="960" fill="#3ddca0" font-size="22" font-weight="700" letter-spacing="1">FIRST COME</text>
    <text x="750" y="998" fill="#8e9adb" font-size="20">Once taken, it's taken</text>
  </g>

  <text x="500" y="1090" fill="#ffffff" font-size="26" font-weight="700" text-anchor="middle">We say no to your competitors,</text>
  <text x="500" y="1126" fill="#3ddca0" font-size="26" font-weight="800" text-anchor="middle">so we can say yes to you.</text>

  <line x1="80" y1="1170" x2="920" y2="1170" stroke="#24cb8c" stroke-opacity="0.5"/>
  <text x="80" y="1212" fill="#ffffff" font-size="24" font-weight="800">FocusedEDU<tspan fill="#5a6478" font-weight="500">  ·  Our focus begins with you.</tspan></text>
</svg>
