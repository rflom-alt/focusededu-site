<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a1f"/>
      <stop offset="1" stop-color="#0a1130"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#14a673" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#14a673" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="1250" fill="url(#bg)"/>
  <rect width="1000" height="1250" fill="url(#glow)"/>

  <!-- header -->
  <rect x="80" y="96" width="48" height="4" rx="2" fill="#24cb8c"/>
  <text x="140" y="104" fill="#3ddca0" font-size="22" font-weight="700" letter-spacing="3">FOR SCHOOLS</text>
  <text x="80" y="185" fill="#ffffff" font-size="62" font-weight="800">Traditional hiring</text>
  <text x="80" y="258" fill="#ffffff" font-size="62" font-weight="800">vs. <tspan fill="#3ddca0">FocusedEDU</tspan></text>

  <!-- column headers -->
  <text x="300" y="360" fill="#8e9adb" font-size="26" font-weight="700" text-anchor="middle">Traditional agency</text>
  <g>
    <rect x="560" y="320" width="360" height="56" rx="28" fill="#24cb8c"/>
    <text x="740" y="358" fill="#060a1f" font-size="26" font-weight="800" text-anchor="middle">FocusedEDU</text>
  </g>

  <!-- rows -->
  <g font-size="25" font-weight="500">
    <!-- row template: label left of center divider -->
    <!-- Row 1 -->
    <text x="80" y="470" fill="#6ee7b7" font-size="20" font-weight="700" letter-spacing="2">TALENT POOL</text>
    <text x="80" y="510" fill="#aeb6cf">Shared with competing</text>
    <text x="80" y="544" fill="#aeb6cf">schools nearby</text>
    <text x="560" y="510" fill="#ffffff" font-weight="600">Yours alone —</text>
    <text x="560" y="544" fill="#ffffff" font-weight="600">one client per region</text>
    <line x1="80" y1="590" x2="920" y2="590" stroke="#e9eef1" stroke-opacity="0.12"/>

    <!-- Row 2 -->
    <text x="80" y="660" fill="#6ee7b7" font-size="20" font-weight="700" letter-spacing="2">CREDENTIALING</text>
    <text x="80" y="700" fill="#aeb6cf">Manual and slow</text>
    <text x="560" y="700" fill="#ffffff" font-weight="600">Automated —</text>
    <text x="560" y="734" fill="#ffffff" font-weight="600">hiring time cut in half</text>
    <line x1="80" y1="780" x2="920" y2="780" stroke="#e9eef1" stroke-opacity="0.12"/>

    <!-- Row 3 -->
    <text x="80" y="850" fill="#6ee7b7" font-size="20" font-weight="700" letter-spacing="2">RISK</text>
    <text x="80" y="890" fill="#aeb6cf">Commit before</text>
    <text x="80" y="924" fill="#aeb6cf">you really know</text>
    <text x="560" y="890" fill="#ffffff" font-weight="600">Temp-to-perm</text>
    <text x="560" y="924" fill="#ffffff" font-weight="600">at no cost</text>
    <line x1="80" y1="970" x2="920" y2="970" stroke="#e9eef1" stroke-opacity="0.12"/>

    <!-- Row 4 -->
    <text x="80" y="1040" fill="#6ee7b7" font-size="20" font-weight="700" letter-spacing="2">BUILT BY</text>
    <text x="80" y="1080" fill="#aeb6cf">Recruiters who fell</text>
    <text x="80" y="1114" fill="#aeb6cf">into the space</text>
    <text x="560" y="1080" fill="#ffffff" font-weight="600">A former</text>
    <text x="560" y="1114" fill="#ffffff" font-weight="600">K-12 teacher</text>
  </g>

  <!-- footer -->
  <line x1="80" y1="1170" x2="920" y2="1170" stroke="#24cb8c" stroke-opacity="0.5"/>
  <text x="80" y="1212" fill="#ffffff" font-size="24" font-weight="800">FocusedEDU<tspan fill="#5a6478" font-weight="500">  ·  Our focus begins with you.</tspan></text>
</svg>
