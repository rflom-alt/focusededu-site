<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>The true cost of an empty classroom</title>
  <desc>A cascade showing how one unfilled K-12 role triggers lost instruction, substitute scrambles, larger classes, staff burnout, and slower student progress.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a1f"/>
      <stop offset="1" stop-color="#0a1130"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.15" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#14a673" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#14a673" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="1250" fill="url(#bg2)"/>
  <rect width="1000" height="1250" fill="url(#glow2)"/>

  <rect x="80" y="96" width="48" height="4" rx="2" fill="#24cb8c"/>
  <text x="140" y="104" fill="#3ddca0" font-size="22" font-weight="700" letter-spacing="3">FOR SCHOOLS</text>
  <text x="80" y="185" fill="#ffffff" font-size="58" font-weight="800">The true cost of</text>
  <text x="80" y="250" fill="#ffffff" font-size="58" font-weight="800">an <tspan fill="#3ddca0">empty classroom</tspan></text>
  <text x="80" y="312" fill="#aeb6cf" font-size="26" font-weight="500">One unfilled role sets off a chain reaction.</text>

  <!-- vertical cascade -->
  <line x1="116" y1="400" x2="116" y2="1060" stroke="#24cb8c" stroke-opacity="0.35" stroke-width="3"/>
  <g>
    <circle cx="116" cy="410" r="13" fill="#24cb8c"/>
    <text x="160" y="404" fill="#ffffff" font-size="30" font-weight="700">Lost instructional time</text>
    <text x="160" y="442" fill="#8e9adb" font-size="22">Students lose continuity from day one</text>
  </g>
  <g>
    <circle cx="116" cy="540" r="13" fill="#24cb8c"/>
    <text x="160" y="534" fill="#ffffff" font-size="30" font-weight="700">A scramble for substitutes</text>
    <text x="160" y="572" fill="#8e9adb" font-size="22">Daily coverage eats up admin time</text>
  </g>
  <g>
    <circle cx="116" cy="670" r="13" fill="#24cb8c"/>
    <text x="160" y="664" fill="#ffffff" font-size="30" font-weight="700">Bigger classes for everyone</text>
    <text x="160" y="702" fill="#8e9adb" font-size="22">Other teachers absorb the overflow</text>
  </g>
  <g>
    <circle cx="116" cy="800" r="13" fill="#24cb8c"/>
    <text x="160" y="794" fill="#ffffff" font-size="30" font-weight="700">Burnout on your staff</text>
    <text x="160" y="832" fill="#8e9adb" font-size="22">Strain compounds and turnover rises</text>
  </g>
  <g>
    <circle cx="116" cy="930" r="13" fill="#24cb8c"/>
    <text x="160" y="924" fill="#ffffff" font-size="30" font-weight="700">Slower student progress</text>
    <text x="160" y="962" fill="#8e9adb" font-size="22">The cost lands where it matters most</text>
  </g>
  <g>
    <circle cx="116" cy="1050" r="15" fill="#3ddca0"/>
    <text x="160" y="1044" fill="#3ddca0" font-size="30" font-weight="800">A fast, vetted fill stops the cascade.</text>
  </g>

  <line x1="80" y1="1170" x2="920" y2="1170" stroke="#24cb8c" stroke-opacity="0.5"/>
  <text x="80" y="1212" fill="#ffffff" font-size="24" font-weight="800">FocusedEDU<tspan fill="#5a6478" font-weight="500">  ·  Our focus begins with you.</tspan></text>
</svg>
